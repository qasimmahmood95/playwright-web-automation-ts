name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least privilege: the jobs only read the repo and upload artifacts (the
# artifact API doesn't use the token's contents scope), so read-only is enough.
permissions:
  contents: read

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check

  test:
    name: Test (${{ matrix.browser }})
    needs: lint
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    env:
      SAUCEDEMO_USERNAME: ${{ vars.SAUCEDEMO_USERNAME }}
      SAUCEDEMO_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
      SAUCEDEMO_LOCKED_USERNAME: ${{ vars.SAUCEDEMO_LOCKED_USERNAME }}
      SAUCEDEMO_PROBLEM_USERNAME: ${{ vars.SAUCEDEMO_PROBLEM_USERNAME }}
      SAUCEDEMO_PERFORMANCE_USERNAME: ${{ vars.SAUCEDEMO_PERFORMANCE_USERNAME }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.browser }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30
      # Blob reports merge across browsers into the single Pages report.
      # Rename per browser so the three don't collide when merged.
      - name: Rename blob report
        if: always()
        run: |
          if [ -f blob-report/report.zip ]; then
            mv blob-report/report.zip blob-report/report-${{ matrix.browser }}.zip
          fi
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: blob-report-${{ matrix.browser }}
          path: blob-report/
          retention-days: 30

  publish-report:
    name: Publish report to Pages
    needs: test
    # Only publish the merged report from green main builds — not PRs (which
    # would overwrite the public report, and forks can't reach Pages anyway).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Job-level permissions replace the top-level block, so contents: read is
    # restated for checkout; pages/id-token are the Pages-deploy scopes.
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Download blob reports
        uses: actions/download-artifact@v7
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true
      # The html reporter writes to playwright-report/ (its default), which the
      # upload-pages-artifact step below consumes. merge-reports has no output
      # flag — the folder is the html reporter default.
      - name: Merge blobs into one HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
