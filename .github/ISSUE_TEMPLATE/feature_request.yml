name: Feature request
description: Suggest a new test, coverage dimension, or tooling improvement.
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What gap or pain point does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Test coverage
        - Page objects / components
        - Fixtures / setup
        - CI/CD
        - Tooling / docs
    validations:
      required: true
